<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성민교회</title>
  <meta name="description" content="성민교회 예배 일정 앱" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="성민교회" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#2f5d3b" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="./apple-touch-icon.png" />
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f3ee;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:#21382a}.card{width:min(88vw,420px);background:white;border-radius:28px;padding:30px 24px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.12)}.icon{width:116px;height:116px;border-radius:26px;margin:0 auto 18px;display:block;box-shadow:0 10px 28px rgba(0,0,0,.18)}h1{font-size:25px;margin:0 0 10px;font-weight:800}p{font-size:15px;line-height:1.7;color:#69766d;margin:0 0 16px}.hint{background:#f1f6f2;border-radius:16px;padding:14px 16px;font-size:14px;line-height:1.7;color:#2f5d3b}.open{display:inline-block;margin-top:18px;padding:12px 18px;border-radius:999px;background:#2f5d3b;color:#fff;text-decoration:none;font-weight:700}.small{font-size:12px;color:#9aa39c;margin-top:14px}
  </style>
</head>
<body>
  <main class="card">
    <img class="icon" src="./apple-touch-icon.png" alt="성민교회 아이콘" />
    <h1>성민교회</h1>
    <p>아이폰 홈화면에 추가하기 위한 전용 페이지입니다.</p>
    <div class="hint">Safari 하단 공유 버튼을 누른 뒤<br><strong>홈 화면에 추가</strong>를 선택해 주세요.</div>
    <a class="open" href="./">앱 바로 열기</a>
    <div class="small">홈화면 아이콘을 눌러 실행하면 성민교회 앱으로 이동합니다.</div>
  </main>
  <script>
    if (window.navigator.standalone) {
      window.location.replace('./');
    }
  </script>
</body>
</html>
