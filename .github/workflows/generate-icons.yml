name: Generate app icons

on:
  push:
    paths:
      - '.github/workflows/generate-icons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pillow and Korean font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          python3 -m pip install --upgrade pillow

      - name: Generate PNG icons
        run: |
          python3 <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          from pathlib import Path

          def make_icon(size, path):
              scale = 4
              W = size * scale
              bg = (47, 93, 59)
              cream = (248, 244, 236)
              dark = (30, 30, 28)

              im = Image.new('RGB', (W, W), bg)
              d = ImageDraw.Draw(im)
              cx = cy = W // 2
              r = int(W * 0.385)

              d.ellipse((cx-r, cy-r, cx+r, cy+r), fill=cream)
              d.ellipse((cx-r, cy-r, cx+r, cy+r), outline=dark, width=max(4, int(size*0.028)*scale))
              inner = int(size * 0.083) * scale
              d.ellipse((cx-r+inner, cy-r+inner, cx+r-inner, cy+r-inner), outline=dark, width=max(2, int(size*0.017)*scale))

              font_candidates = [
                  '/usr/share/fonts/truetype/nanum/NanumSquareRoundB.ttf',
                  '/usr/share/fonts/truetype/nanum/NanumGothicBold.ttf',
                  '/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc'
              ]
              font_path = next(p for p in font_candidates if Path(p).exists())
              font = ImageFont.truetype(font_path, int(size * 0.24) * scale)
              text = '예배'
              bbox = d.textbbox((0, 0), text, font=font)
              tw, th = bbox[2] - bbox[0], bbox[3] - bbox[1]
              d.text((cx - tw/2, cy - th/2 - int(size*0.04)*scale), text, font=font, fill=dark)

              uy = cy + int(size * 0.195) * scale
              d.rounded_rectangle((cx-int(size*0.115)*scale, uy, cx+int(size*0.115)*scale, uy+int(size*0.03)*scale), radius=int(size*0.015)*scale, fill=dark)

              im = im.resize((size, size), Image.Resampling.LANCZOS)
              im.save(path, format='PNG', optimize=True)

          make_icon(180, 'worship-app-icon-2026.png')
          make_icon(180, 'apple-touch-icon.png')
          make_icon(192, 'icon-192.png')
          make_icon(512, 'icon-512.png')
          PY

      - name: Commit icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worship-app-icon-2026.png apple-touch-icon.png icon-192.png icon-512.png
          git diff --staged --quiet || git commit -m "fix: generate readable worship app icons"
          git push
