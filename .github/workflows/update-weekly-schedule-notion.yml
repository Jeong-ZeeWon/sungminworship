name: Update weekly schedule on Notion

on:
  schedule:
    # 매주 금요일 23:17, 23:47 KST = 금요일 14:17, 14:47 UTC
    # GitHub Actions는 정각 cron이 지연/누락될 수 있어 백업 실행을 둡니다. (토 09:20 KST 최종 백업)
    - cron: '17 14 * * 5'
    - cron: '47 14 * * 5'
    - cron: '20 0 * * 6'
  workflow_dispatch:
    inputs:
      override_dow:
        description: '요일 검증 우회(테스트용)'
        required: false
        default: 'false'
  push:
    paths:
      - '.github/workflows/update-weekly-schedule-notion.yml'
      - 'scripts/update-weekly-schedule-notion.mjs'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Update Notion 한 주간 예배 담당자 page
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          OVERRIDE_DOW: ${{ inputs.override_dow == 'true' && '1' || '' }}
        run: node scripts/update-weekly-schedule-notion.mjs
