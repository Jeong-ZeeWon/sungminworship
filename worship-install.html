<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성민교회</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="성민교회" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#2f5d3b" />
  <link rel="apple-touch-icon" sizes="180x180" href="./worship-icon.png" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./worship-icon.png" />
  <link rel="icon" type="image/png" href="./worship-icon.png" />
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f3ee;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#21382a}
    main{width:min(88vw,420px);background:white;border-radius:28px;padding:30px 24px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.12)}
    img{width:118px;height:118px;border-radius:27px;margin:0 auto 18px;display:block;box-shadow:0 10px 28px rgba(0,0,0,.18)}
    h1{font-size:25px;margin:0 0 10px;font-weight:800}
    p{font-size:15px;line-height:1.7;color:#69766d;margin:0 0 16px}
    .hint{background:#f1f6f2;border-radius:16px;padding:14px 16px;font-size:14px;line-height:1.7;color:#2f5d3b}
    a{display:inline-block;margin-top:18px;padding:12px 18px;border-radius:999px;background:#2f5d3b;color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main>
    <img src="./worship-icon.png" alt="성민교회 아이콘" />
    <h1>성민교회</h1>
    <p>이 페이지에서 홈화면에 추가하면 예배 로고 아이콘이 적용됩니다.</p>
    <div class="hint">Safari 공유 버튼 → <strong>홈 화면에 추가</strong></div>
    <a href="./">앱 바로 열기</a>
  </main>
</body>
</html>
